name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Single fast job: install, typecheck, lint, format-check, test, build.
# Matches `pnpm check` locally so green-on-CI === green-on-laptop.
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test
      - run: pnpm build
